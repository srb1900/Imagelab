<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageLab - Image to PDF</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="elements.css">
</head>

<body>

  <header class="topbar">
    <div class="logo">
      <div class="logo-icon">
          <img src="imgicon.svg" alt="">
      </div>
      <span class="logo-text">
          ImageLab
      </span>
    </div>
  </header>

  <main class="content">

    <button class="btn-back" onclick="window.location.replace('index.html')">
  <img src="gobk.svg" alt="" width="20" height="20">
  <span>Go Back</span>
</button>

    <h1>IMAGE TO PDF</h1>

    <div class="upload-wrapper">

        <input 
            type="file" 
            id="fileInput" 
            accept="image/png, image/jpeg, image/webp" hidden>

        <div class="upload-box" id="uploadBox">
              <div class="upload-icon">
                <img src="up.svg" alt="">
            </div>
            <p class="primary-text">
                Drop an image here or click to browse
            </p>

            <p class="secondary-text">
                JPG, PNG, or WEBP
            </p>

        </div>

    </div>

  </main>

  <!-- jsPDF CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- External JS -->
  <script src="img2pdf.js"></script>

</body>
</html>
