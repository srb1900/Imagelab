<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageLab</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <!-- HEADER -->
    <header class="topbar">
        <div class="logo">
            <div class="logo-icon">
                <img src="imgicon.svg" alt="">
            </div>
            <span class="logo-text">ImageLab</span>
        </div>
    </header>

    <!-- TITLE -->
    <div class="title">
        <h1 class="hero-title">Your Creative Assistant</h1>
    </div>

    <!-- CARDS -->
    <div class="cards">

        <button class="card" data-link="imgcomp.html">
            <div class="inc">
                <div class="svg">
                    <img src="imgcp.svg" alt="">
                </div>
                <div class="text">
                    <h2>COMPRESS IMAGES & PDF</h2>
                    <p>Reduce file size</p>
                </div>
            </div>
        </button>

        <button class="card" data-link="img2pdf.html">
            <div class="inc">
                <div class="svg">
                    <img src="img2pdf.svg" alt="">
                </div>
                <div class="text">
                    <h2>IMAGE TO PDF</h2>
                    <p>Convert your pictures</p>
                </div>
            </div>
        </button>

        <button class="card" data-link="pdfmerge.html">
            <div class="inc">
                <div class="svg">
                    <img src="mergepdf.svg" alt="">
                </div>
                <div class="text">
                    <h2>MERGE PDF</h2>
                    <p>Add your PDFs</p>
                </div>
            </div>
        </button>

    </div>

    <script src="home.js"></script>
</body>
</html>
